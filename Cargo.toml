[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/chronista-club/unison-fleets"

[workspace.dependencies]
unison-kdl = { path = "crates/unison-kdl" }
kdl = "6"
serde = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
