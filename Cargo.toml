[package]
name = "unison-kdl"
version = "0.1.0"
edition = "2021"
description = "KDL serialization/deserialization with serde support"
license = "MIT"
repository = "https://github.com/chronista-club/unison-kdl"
keywords = ["kdl", "serde", "serialization", "config"]
categories = ["encoding", "parser-implementations"]

[dependencies]
kdl = "6"
serde = "1"
thiserror = "2"

[dev-dependencies]
pretty_assertions = "1"
serde = { version = "1", features = ["derive"] }
