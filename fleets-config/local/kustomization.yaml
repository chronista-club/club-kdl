apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: unison-system

bases:
  - ../base

patchesStrategicMerge:
  - unison-core-patch.yaml

configMapGenerator:
  - name: unison-config
    behavior: merge
    literals:
      - UNISON_FLEET=local
      - LOG_LEVEL=debug
      - API_HOST=localhost
      - API_PORT=8080

# ローカル開発用のNodePortを追加
patches:
  - target:
      kind: Service
      name: unison-core
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080