apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: unison-system

resources:
  - namespace.yaml
  - unison-core-deployment.yaml
  - unison-core-service.yaml

commonLabels:
  app.kubernetes.io/part-of: unison
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: unison-config
    literals:
      - LOG_LEVEL=info
      - METRICS_PORT=9090