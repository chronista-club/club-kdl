apiVersion: apps/v1
kind: Deployment
metadata:
  name: unison-core
  namespace: unison-system
  labels:
    app.kubernetes.io/name: unison-core
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: unison
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unison-core
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unison-core
        app.kubernetes.io/component: core
        app.kubernetes.io/part-of: unison
    spec:
      containers:
      - name: unison-core
        image: unison-core:latest
        imagePullPolicy: Never  # ローカル開発用
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: RUST_LOG
          value: "info"
        - name: NODE_ENV
          value: "development"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unison-core
  namespace: unison-system
  labels:
    app.kubernetes.io/name: unison-core
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: unison
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: unison-core
    app.kubernetes.io/component: core