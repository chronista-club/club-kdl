apiVersion: apps/v1
kind: Deployment
metadata:
  name: unison-demo
  namespace: unison-system
  labels:
    app.kubernetes.io/name: unison-demo
    app.kubernetes.io/component: demo
    app.kubernetes.io/part-of: unison
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: unison-demo
      app.kubernetes.io/component: demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unison-demo
        app.kubernetes.io/component: demo
        app.kubernetes.io/part-of: unison
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        env:
        - name: UNISON_FLEET
          value: "local"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: unison-demo
  namespace: unison-system
  labels:
    app.kubernetes.io/name: unison-demo
    app.kubernetes.io/component: demo
    app.kubernetes.io/part-of: unison
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
    nodePort: 30080
  selector:
    app.kubernetes.io/name: unison-demo
    app.kubernetes.io/component: demo